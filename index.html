<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cocktail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ojuju:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0a0a;
      font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    }

    /* Layer 1: blurred color bands — soft edges between ingredients */
    #stage {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      width: 100%;
      filter: blur(10px);
    }

    .stripe {
      flex: 0 0 0%;
      min-height: 0;
      width: 100%;
      transition: flex-basis 0.85s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Layer 2: grain texture — soft-light blend adds luminosity variation */
    #grain {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      mix-blend-mode: soft-light;
      opacity: 0.18;
    }

    /* Layer 3: label overlay — same flex layout, sits above the blur */
    #label-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      width: 100%;
      pointer-events: none;
      z-index: 10;
    }

    .label-row {
      flex: 0 0 0%;
      min-height: 0;
      overflow: hidden;
      position: relative;
      transition: flex-basis 0.85s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .stripe-info {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: row;
      align-items: center;
      padding-left: 24px;
      gap: 14px;
      opacity: 0;
      transition: opacity 0.3s 0.15s;
    }

    body.show-info .stripe-info { opacity: 1; }

    .info-name {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .info-amount {
      font-size: 9px;
      letter-spacing: 0.1em;
      white-space: nowrap;
      opacity: 0.6;
    }

    /* Cocktail title */
    #title {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      font-family: 'Ojuju', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: capitalize;
      color: rgba(255,255,255,0);
      transition: color 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }

    body.show-info #title { color: rgba(255,255,255,0.55); }

    /* Toggle switch */
    #info-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 20;
      width: 36px; height: 20px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.08);
      cursor: pointer;
      padding: 0;
      transition: background 0.25s, border-color 0.25s;
    }
    #info-btn::after {
      content: '';
      position: absolute;
      top: 3px; left: 3px;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), background 0.25s;
    }
    #info-btn:hover { border-color: rgba(255,255,255,0.4); }
    body.show-info #info-btn {
      background: rgba(255,255,255,0.16);
      border-color: rgba(255,255,255,0.4);
    }
    body.show-info #info-btn::after {
      transform: translateX(16px);
      background: rgba(255,255,255,0.85);
    }
  </style>
</head>
<body>

<!-- Layer 1: soft blurred color blocks -->
<div id="stage"></div>

<!-- Layer 2: grain/noise texture -->
<svg id="grain" xmlns="http://www.w3.org/2000/svg">
  <filter id="grain-filter" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
    <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
    <feColorMatrix type="saturate" values="0" in="noise"/>
  </filter>
  <rect width="100%" height="100%" filter="url(#grain-filter)"/>
</svg>

<!-- Layer 3: sharp labels, mirrors stage flex layout exactly -->
<div id="label-overlay"></div>

<div id="title"></div>
<button id="info-btn"></button>

<script>
const INGREDIENTS = {
  'bourbon':            { name: 'Bourbon',           color: '#C68642', text: 'rgba(0,0,0,0.6)'   },
  'rye-whiskey':        { name: 'Rye Whiskey',        color: '#9C4A1A', text: 'rgba(255,255,255,0.75)' },
  'gin':                { name: 'Gin',                color: '#B4CDD9', text: 'rgba(0,0,0,0.5)'   },
  'blanco-tequila':     { name: 'Blanco Tequila',     color: '#DFD9C0', text: 'rgba(0,0,0,0.45)'  },
  'campari':            { name: 'Campari',             color: '#C11B17', text: 'rgba(255,255,255,0.85)' },
  'sweet-vermouth':     { name: 'Sweet Vermouth',     color: '#6B2737', text: 'rgba(255,255,255,0.8)'  },
  'dry-vermouth':       { name: 'Dry Vermouth',       color: '#BCC9A0', text: 'rgba(0,0,0,0.55)'  },
  'cointreau':          { name: 'Cointreau',           color: '#E8984A', text: 'rgba(0,0,0,0.6)'   },
  'lime-juice':         { name: 'Lime Juice',         color: '#7DB843', text: 'rgba(0,0,0,0.6)'   },
  'lemon-juice':        { name: 'Lemon Juice',        color: '#EDD640', text: 'rgba(0,0,0,0.65)'  },
  'simple-syrup':       { name: 'Simple Syrup',       color: '#EED890', text: 'rgba(0,0,0,0.5)'   },
  'sugar':              { name: 'Sugar',               color: '#F0EBD8', text: 'rgba(0,0,0,0.4)'   },
  'egg-white':          { name: 'Egg White',           color: '#E8E4DC', text: 'rgba(0,0,0,0.38)'  },
  'angostura':          { name: 'Angostura Bitters',  color: '#2D0800', text: 'rgba(255,255,255,0.65)' },
  'orange-peel':        { name: 'Orange Peel',        color: '#E87820', text: 'rgba(0,0,0,0.6)'   },
  'maraschino-cherry':  { name: 'Maraschino Cherry',  color: '#C0204A', text: 'rgba(255,255,255,0.85)' },
  'lemon-twist':        { name: 'Lemon Twist',        color: '#F0C030', text: 'rgba(0,0,0,0.6)'   },
  'olive':              { name: 'Olive',               color: '#5A7A2A', text: 'rgba(255,255,255,0.75)' },
  'salt-rim':           { name: 'Salt Rim',            color: '#D4D4D4', text: 'rgba(0,0,0,0.4)'   },
};

const ORDER = [
  'bourbon', 'rye-whiskey', 'gin', 'blanco-tequila',
  'campari', 'sweet-vermouth', 'dry-vermouth', 'cointreau',
  'lime-juice', 'lemon-juice', 'simple-syrup', 'sugar', 'egg-white',
  'angostura',
  'orange-peel', 'maraschino-cherry', 'lemon-twist', 'olive', 'salt-rim',
];

const COCKTAILS = [
  {
    name: 'Old Fashioned',
    ingredients: [
      { id: 'bourbon',      units: 2,    display: '2 oz'        },
      { id: 'sugar',        units: 0.4,  display: '1 sugar cube' },
      { id: 'angostura',    units: 0.25, display: '2–3 dashes'  },
      { id: 'orange-peel',  units: 0.15, display: 'garnish'     },
    ]
  },
  {
    name: 'Negroni',
    ingredients: [
      { id: 'gin',            units: 1,    display: '1 oz'    },
      { id: 'campari',        units: 1,    display: '1 oz'    },
      { id: 'sweet-vermouth', units: 1,    display: '1 oz'    },
      { id: 'orange-peel',    units: 0.15, display: 'garnish' },
    ]
  },
  {
    name: 'Manhattan',
    ingredients: [
      { id: 'rye-whiskey',       units: 2,    display: '2 oz'     },
      { id: 'sweet-vermouth',    units: 1,    display: '1 oz'     },
      { id: 'angostura',         units: 0.15, display: '2 dashes' },
      { id: 'maraschino-cherry', units: 0.15, display: 'garnish'  },
    ]
  },
  {
    name: 'Margarita',
    ingredients: [
      { id: 'blanco-tequila', units: 2,    display: '2 oz'    },
      { id: 'lime-juice',     units: 1,    display: '1 oz'    },
      { id: 'cointreau',      units: 0.75, display: '0.75 oz' },
      { id: 'salt-rim',       units: 0.15, display: 'salt rim' },
    ]
  },
  {
    name: 'Martini',
    ingredients: [
      { id: 'gin',          units: 2.5,  display: '2.5 oz'  },
      { id: 'dry-vermouth', units: 0.5,  display: '0.5 oz'  },
      { id: 'lemon-twist',  units: 0.12, display: 'garnish' },
      { id: 'olive',        units: 0.12, display: 'garnish' },
    ]
  },
  {
    name: 'Whiskey Sour',
    ingredients: [
      { id: 'bourbon',      units: 2,    display: '2 oz'    },
      { id: 'lemon-juice',  units: 0.75, display: '0.75 oz' },
      { id: 'simple-syrup', units: 0.75, display: '0.75 oz' },
      { id: 'egg-white',    units: 0.5,  display: '0.5 oz'  },
    ]
  },
];

let current = 0;

const stage        = document.getElementById('stage');
const labelOverlay = document.getElementById('label-overlay');
const titleEl      = document.getElementById('title');

const stripes = {};
ORDER.forEach(id => {
  const ing = INGREDIENTS[id];

  const stripeEl = document.createElement('div');
  stripeEl.className = 'stripe';
  stripeEl.style.background = ing.color;
  stage.appendChild(stripeEl);

  const labelRow = document.createElement('div');
  labelRow.className = 'label-row';

  const info = document.createElement('div');
  info.className = 'stripe-info';

  const nameEl = document.createElement('div');
  nameEl.className = 'info-name';
  nameEl.style.color = ing.text;
  nameEl.textContent = ing.name;

  const amtEl = document.createElement('div');
  amtEl.className = 'info-amount';
  amtEl.style.color = ing.text;

  info.appendChild(nameEl);
  info.appendChild(amtEl);
  labelRow.appendChild(info);
  labelOverlay.appendChild(labelRow);

  stripes[id] = { stripeEl, labelRow, amtEl };
});

function render(idx) {
  const cocktail = COCKTAILS[idx];
  const map = Object.fromEntries(cocktail.ingredients.map(i => [i.id, i]));
  const total = cocktail.ingredients.reduce((s, i) => s + i.units, 0);

  ORDER.forEach(id => {
    const s = stripes[id];
    const ing = map[id];
    const pct = ing ? (ing.units / total * 100).toFixed(4) + '%' : '0%';
    s.stripeEl.style.flexBasis = pct;
    s.labelRow.style.flexBasis = pct;
    if (ing) s.amtEl.textContent = ing.display;
  });

  titleEl.textContent = cocktail.name;
}

function go(idx) {
  current = ((idx % COCKTAILS.length) + COCKTAILS.length) % COCKTAILS.length;
  render(current);
}

document.getElementById('info-btn').addEventListener('click', () => {
  document.body.classList.toggle('show-info');
});

document.addEventListener('keydown', e => {
  if      (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(current - 1);
  else if (e.key === 'ArrowRight' || e.key === 'ArrowDown')  go(current + 1);
  else if (e.key === 'i' || e.key === 'I') document.body.classList.toggle('show-info');
});

let touchX = null;
document.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  if (touchX === null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 40) go(dx < 0 ? current + 1 : current - 1);
  touchX = null;
});

document.body.classList.add('show-info');
render(0);
</script>

</body>
</html>
